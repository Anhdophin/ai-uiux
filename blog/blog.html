<!DOCTYPE html>
<!-- AI EDIT NOTE: Trước khi sửa file này, đọc AGENTS.md + .cursorrules + AI-EDIT-PRECHECK.md ở root project. -->
<!-- BLOG STRUCTURE: Left (posts) - Right (sidebar: categories, tags, recent posts). Data từ /blog/data/blog-catalog.json -->
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Anhdophin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../shared/subpage-components.css" />
  <link rel="stylesheet" href="./blog-shared/blog-catalog.css" />
  <style>
    :root {
      --blog-bg: #f5f7fa;
      --blog-card: #ffffff;
      --blog-ink: #111315;
      --blog-muted: #6d747c;
      --blog-line: #d9dee6;
      --blog-dark: #0d1117;
      --blog-radius: 28px;
      --blog-shadow: 0 28px 80px rgba(16, 23, 34, 0.09);
      --blog-shell: 1360px;
      --blog-soft: #f7f8fa;
      --blog-accent: #7cb6de;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      font-family:
        "Inter",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background: linear-gradient(180deg, #f8f9fb 0%, #f0f4f9 100%);
      color: var(--blog-ink);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Shared Header (injected by setupSharedShell) -->
  <div id="subpage-header"></div>

  <main class="blog-main">
    <div class="blog-shell">
      <section class="blog-board">
        <div class="blog-grid">
          <!-- LEFT: Blog Posts -->
          <div class="blog-left-stack">
            <div id="blogPostsContainer">
              <!-- Posts rendered here by blog-functions.js -->
            </div>
          </div>

          <!-- RIGHT: Sidebar (Categories, Tags, Recent Posts) -->
          <div class="blog-right-stack">
            <div id="blogSidebar">
              <!-- Sidebar rendered here by blog-functions.js -->
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Shared Footer (injected by subpage-components.js) -->
  <div id="subpage-footer"></div>

  <!-- Load shell components and blog functions -->
  <script src="../shared/subpage-components.js"></script>
  <script src="./blog-shared/blog-functions.js"></script>
</body>
</html>
