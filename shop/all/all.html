<!doctype html>
<!-- AI EDIT NOTE: Trước khi sửa file này, đọc AGENTS.md + .cursorrules + AI-EDIT-PRECHECK.md ở root project. -->
<!-- CLONE NOTE: Khi clone nhóm/sản phẩm, kiểm tra slug, title, href, page.meta.json, media/, và chạy lại python shop/scan_shop.py -->
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Products - Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="../../shared/subpage-components.css" />
    <link rel="stylesheet" href="../shop-shared/catalog.css" />
    <style>
      body {
        margin: 0;
        font-family: "Inter", system-ui, sans-serif;
        background: linear-gradient(180deg, #f3f5f8 0%, #e8ecf2 100%);
        color: #111315;
      }
      .shop-shell {
        width: min(calc(100% - 28px), 1360px);
        margin: 0 auto;
      }
      .product-list {
        display: grid;
        gap: 12px;
      }
      .filter-chips {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .chip {
        border: 1px solid rgba(17, 19, 21, 0.12);
        background: #fff;
        border-radius: 999px;
        min-height: 34px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        transition: 0.18s ease;
      }
      .chip.is-active,
      .chip:hover {
        background: #111315;
        color: #fff;
        border-color: #111315;
      }
      .panel-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .panel-title h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }
      .panel-title a {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6d747c;
      }
      .icon-arrow {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 1px solid rgba(17, 19, 21, 0.16);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="subpage-header"></div>
    <main class="catalog-page">
      <div class="shop-shell">
        <section class="catalog-hero">
          <div class="catalog-kicker">Dynamic catalog page</div>
          <h1 class="catalog-title">Tổng hợp Sản Phẩm</h1>
          <!--
            TRANG ALL ĐỌC DỮ LIỆU TỪ shop/data/shop-catalog.json.
            Nếu thêm nhóm hoặc sản phẩm mới mà trang này chưa cập nhật, hãy chạy lại: python shop/scan_shop.py
            Nếu muốn đổi text giới thiệu trang All thì sửa trực tiếp ở file shop/all/index.html hoặc chuyển text đó vào page.meta.json nếu sau này muốn render động.
          -->
          <!--
      <p>Trang này tự đọc toàn bộ nhóm sản phẩm và sản phẩm bên trong nhóm. Bộ lọc dùng trường <strong>experience_tags</strong> trong từng <code>page.meta.json</code>, nên sau này thêm sản phẩm mới chỉ cần gắn phân loại đúng là lọc tự chạy.</p>
      <div class="catalog-meta"><span class="catalog-pill">Tự cập nhật sau scan</span><span class="catalog-pill">Có nhóm + sản phẩm</span>
        <span class="catalog-pill">Lọc theo trải nghiệm</span></div>-->
        </section>
        <div class="catalog-grid">
          <section class="catalog-panel">
            <div class="panel-title">
              <h3>All categories</h3>
              <a href="../">Back to shop</a>
            </div>
            <div class="catalog-categories" id="allCategoryGrid"></div>
          </section>
          <section class="catalog-panel">
            <div class="panel-title">
              <h3>All products</h3>
              <a href="../">Shop</a>
            </div>
            <div class="filter-chips" id="allFilters"></div>
            <div id="allProductTabs"></div>
          </section>
        </div>
      </div>
    </main>
    <div id="subpage-footer"></div>
    <script src="../../shared/subpage-components.js"></script>
    <script src="../shop-shared/catalog.js"></script>
    <script>
      (async function () {
        const catalog = await ShopCatalog.fetchCatalog();
        document.getElementById("allCategoryGrid").innerHTML =
          ShopCatalog.renderCategoryCards(catalog.categories || []);
        document.getElementById("allFilters").innerHTML =
          ShopCatalog.renderExperienceChips(
            catalog.experience_tags || [],
            "all",
          );
        const allProductTabs = document.getElementById("allProductTabs");
        allProductTabs.innerHTML = ShopCatalog.renderProductTabs(
          catalog.products || [],
          catalog.categories || [],
          { includeLatest: false, includeAll: true },
        );
        ShopCatalog.bindTabs(allProductTabs);
        ShopCatalog.bindFilter(
          document.getElementById("allFilters"),
          allProductTabs,
        );
      })().catch((error) => {
        console.error(error);
        document.getElementById("allProductTabs").innerHTML =
          '<div class="empty-state">Không tải được catalog.</div>';
      });
    </script>
  </body>
</html>
